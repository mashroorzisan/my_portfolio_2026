databases:
  - name: portfolio-db
    databaseName: portfolio
    user: portfolio
    plan: free

services:
  - type: web
    name: ishtiaque-portfolio
    env: python
    plan: free
    pythonVersion: "3.11.0"
    buildCommand: "bash build.sh"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        value: ishtiaque2025
      - key: PYTHON_VERSION
        value: "3.11.0"
    autoDeploy: true
